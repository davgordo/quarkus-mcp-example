quarkus.http.host=127.0.0.1
quarkus.http.port=${MCP_SERVER_PORT:8080}
quarkus.mcp.server.http.root-path=/mcp

#quarkus.mcp.server.traffic-logging.enabled=true

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:demo}
quarkus.datasource.password=${DB_PASSWORD:demo}
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:${DB_PORT:5432}/${DB_NAME:demo}?currentSchema=example

quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p %s%e%n